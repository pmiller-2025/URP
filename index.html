// ─── CALCULATOR HELPERS ───────────────────────────────────────────────
const inf = (b, r, y) => (!isFinite(b) || !isFinite(r) || !isFinite(y)) ? (b || 0) : b * Math.pow(1 + r / 100, y);
const txAmt = (inc, rate, taxable) => (!taxable || !inc) ? 0 : inc * rate / 100;
const safe = (n) => (!isFinite(n) || isNaN(n)) ? 0 : n;
const getLiving = (exp) => exp.type === "fixed" ? exp.basic : exp.detailed.reduce((t, c) => t + c.amount, 0);
const isActive = (sY, sM, dur, off) => { const s = (sY - 1) * 12 + (sM - 1); const e = off - s; return e >= 0 && e < dur; };
const mortCalc = (bal, rate, months) => { if (bal <= 0 || months <= 0) return 0; const r = rate / 100 / 12; if (r === 0) return bal / months; return bal * (r * Math.pow(1 + r, months)) / (Math.pow(1 + r, months) - 1); };
const calcAge = (bm, by, cm, cy) => { let a = cy - by; if (cm < bm) a--; return a; };
const getPaulDeath = (s) => { for (let y = 1; y <= s.pi.projYears; y++) if (s.pi.paulAge + y - 1 >= s.pi.paulEOL) return 2025 + y - 1; return null; };

function calcAnnual(s) {
  const res = []; let savBal = s.sav.init, mortBal = s.h.mortBal;
  const pDeath = getPaulDeath(s);
  for (let yr = 1; yr <= s.pi.projYears; yr++) {
    const yi = yr - 1, mo = yi * 12;
    const pAge = s.pi.paulAge + yi, jAge = s.pi.jessAge + yi;
    const pA = pAge < s.pi.paulEOL, jA = jAge < s.pi.jessEOL;
    let pSS = 0, jSS = 0;
    if (pA && jA) {
      const pE = pAge >= s.ss.paulStart, jE = jAge >= s.ss.jessStart;
      pSS = pE ? inf(s.ss.paulAmt * 12, s.ss.cola, yi) : 0;
      if (jE && !pE) jSS = inf(s.ss.jessAmt * 12, s.ss.cola, yi);
      else if (jE && pE) jSS = inf((s.ss.jessAmt + s.ss.jessSpousal) * 12, s.ss.cola, yi);
    } else if (!pA && jA) { jSS = jAge >= s.ss.jessStart ? inf(s.ss.paulAmt * 12, s.ss.cola, yi) : 0; }
    else if (pA && !jA) { pSS = pAge >= s.ss.paulStart ? inf(s.ss.paulAmt * 12, s.ss.cola, yi) : 0; }
    let va = 0;
    if (pA) va = inf(s.oi.va * 12, s.exp.infl, yi);
    else if (!pA && jA && pDeath && pDeath >= 2035) va = inf(s.oi.va * 12 * 0.5, s.exp.infl, yi);
    const yInc = (amt, sy, sm, dur) => { const sOff = (sy - 1) * 12 + (sm - 1), el = mo - sOff; let m = 0; if (el >= 0 && el < dur) m = Math.min(12, dur - el); else if (el < 0 && -el < 12) m = Math.min(12 - (-el), dur); return amt * m; };
    const biz = yInc(s.oi.biz, s.oi.bizSY, s.oi.bizSM, s.oi.bizDur);
    const jw = yInc(s.oi.jess, s.oi.jessSY, s.oi.jessSM, s.oi.jessDur);
    const c35 = yInc(s.oi.ch35, s.oi.ch35SY, s.oi.ch35SM, s.oi.ch35Dur);
    const i1 = s.oi.i1 > 0 ? yInc(s.oi.i1, s.oi.i1SY, s.oi.i1SM, s.oi.i1Dur) : 0;
    const i2 = s.oi.i2 > 0 ? yInc(s.oi.i2, s.oi.i2SY, s.oi.i2SM, s.oi.i2Dur) : 0;
    const i3 = s.oi.i3 > 0 ? yInc(s.oi.i3, s.oi.i3SY, s.oi.i3SM, s.oi.i3Dur) : 0;
    const totInc = pSS + jSS + va + biz + jw + c35 + i1 + i2 + i3;
    const taxes = txAmt(pSS, s.tr.ss, s.ss.paulTax) + txAmt(jSS, s.tr.ss, s.ss.jessTax) + txAmt(biz, s.tr.biz, true) + txAmt(jw, s.tr.jess, true);
    const ati = totInc - taxes;
    const livExp = inf(getLiving(s.exp) * 12, s.exp.infl, yi);
    const liSO = (s.exp.insSY - 1) * 12 + (s.exp.insSM - 1), liEO = (s.exp.insEY - 1) * 12 + (s.exp.insEM - 1);
    let liMo = 0; for (let m = 0; m < 12; m++) { const o = mo + m; if (o >= liSO && o <= liEO) liMo++; }
    const insAnn = s.exp.ins * liMo;
    const e1A = s.exp.e1 > 0 ? yInc(s.exp.e1, s.exp.e1SY, s.exp.e1SM, s.exp.e1Dur) : 0;
    const e2A = s.exp.e2 > 0 ? yInc(s.exp.e2, s.exp.e2SY, s.exp.e2SM, s.exp.e2Dur) : 0;
    const e3A = s.exp.e3 > 0 ? yInc(s.exp.e3, s.exp.e3SY, s.exp.e3SM, s.exp.e3Dur) : 0;
    let mortAnn = 0, lsAnn = 0, wb = mortBal;
    const lsO = (s.h.lsSY - 1) * 12 + (s.h.lsSM - 1);
    if (s.h.lsAmt > 0 && lsO >= mo && lsO <= mo + 11) { const lp = Math.min(s.h.lsAmt, wb); lsAnn += lp; wb = Math.max(0, wb - lp); }
    for (let m = 0; m < 12; m++) {
      if (wb > 0) {
        const o = mo + m, r = s.h.intRate / 100 / 12, mi = wb * r;
        let mp; if (s.h.accel && o < s.h.targetMo) { const rm = Math.max(1, s.h.targetMo - o); const req = mortCalc(wb, s.h.intRate, rm); mp = Math.min(req - mi, wb); }
        else mp = Math.min(s.h.mortPmt - mi, wb);
        mp = Math.max(0, mp); mortAnn += mi + mp; wb = Math.max(0, wb - mp);
      }
    }
    mortBal = wb;
    const ncf = ati - livExp - insAnn - mortAnn - lsAnn - e1A - e2A - e3A;
    savBal += ncf + s.sav.addl;
    const inv = Math.max(0, savBal) * s.sav.ret / 100;
    const invTax = s.sav.taxGains && inv > 0 ? inv * s.sav.gainsTax / 100 : 0;
    savBal = safe(savBal + inv - invTax);
    const totTax = safe(taxes) + safe(invTax);
    const hv = inf(s.h.homeVal, s.h.appreciation, yi);
    res.push({ yr: 2025 + yi, pAge: safe(pAge), jAge: safe(jAge), pSS: safe(pSS), jSS: safe(jSS), va: safe(va), biz: safe(biz), jw: safe(jw), c35: safe(c35), totInc: safe(totInc), totTax: safe(totTax), ati: safe(ati), livExp: safe(livExp), ins: safe(insAnn), e1: safe(e1A), e2: safe(e2A), e3: safe(e3A), mort: safe(mortAnn + lsAnn), ncf: safe(ncf), invRet: safe(inv), netInv: safe(inv - invTax), sav: safe(savBal), hv: safe(hv), mortBal: safe(mortBal), nw: safe(hv + savBal - mortBal) });
  }
  return res;
}

function calcMonthly(s, year) {
  const res = []; const yi = year - 1;
  const ann = calcAnnual(s);
  let runBal = yi > 0 && ann[yi - 2] ? ann[yi - 2].sav : s.sav.init;
  let mortBal = yi > 0 && ann[yi - 2] ? ann[yi - 2].mortBal : s.h.mortBal;
  const livM = inf(getLiving(s.exp), s.exp.infl, yi);
  const pDeath = getPaulDeath(s);
  for (let m = 0; m < 12; m++) {
    const off = yi * 12 + m;
    const aM = (m + (s.pi.startM - 1)) % 12, aY = s.pi.startY + yi + Math.floor((m + s.pi.startM - 1) / 12);
    const mn = new Date(aY, aM).toLocaleDateString("en-US", { month: "short", year: "numeric" });
    const pAgeM = calcAge(s.pi.paulBM, s.pi.paulBY, aM + 1, aY);
    const jAgeM = calcAge(s.pi.jessBM, s.pi.jessBY, aM + 1, aY);
    const pA = pAgeM < s.pi.paulEOL, jA = jAgeM < s.pi.jessEOL;
    let pSS = 0, jSS = 0;
    if (pA && jA) {
      const pE = pAgeM >= s.ss.paulStart && (pAgeM > s.ss.paulStart || aM + 1 > s.pi.paulBM);
      const jE = jAgeM >= s.ss.jessStart && (jAgeM > s.ss.jessStart || aM + 1 > s.pi.jessBM);
      pSS = pE ? inf(s.ss.paulAmt, s.ss.cola, yi) : 0;
      if (jE && !pE) jSS = inf(s.ss.jessAmt, s.ss.cola, yi);
      else if (jE && pE) jSS = inf(s.ss.jessAmt + s.ss.jessSpousal, s.ss.cola, yi);
    } else if (!pA && jA) { jSS = jAgeM >= s.ss.jessStart ? inf(s.ss.paulAmt, s.ss.cola, yi) : 0; }
    else if (pA && !jA) { pSS = pAgeM >= s.ss.paulStart ? inf(s.ss.paulAmt, s.ss.cola, yi) : 0; }
    let va = 0;
    if (pA) va = inf(s.oi.va, s.exp.infl, yi);
    else if (!pA && jA && pDeath && pDeath >= 2035) va = inf(s.oi.va * 0.5, s.exp.infl, yi);
    const biz = isActive(s.oi.bizSY, s.oi.bizSM, s.oi.bizDur, off) ? s.oi.biz : 0;
    const jw = isActive(s.oi.jessSY, s.oi.jessSM, s.oi.jessDur, off) ? s.oi.jess : 0;
    const c35 = isActive(s.oi.ch35SY, s.oi.ch35SM, s.oi.ch35Dur, off) ? s.oi.ch35 : 0;
    const i1 = s.oi.i1 > 0 && isActive(s.oi.i1SY, s.oi.i1SM, s.oi.i1Dur, off) ? s.oi.i1 : 0;
    const i2 = s.oi.i2 > 0 && isActive(s.oi.i2SY, s.oi.i2SM, s.oi.i2Dur, off) ? s.oi.i2 : 0;
    const i3 = s.oi.i3 > 0 && isActive(s.oi.i3SY, s.oi.i3SM, s.oi.i3Dur, off) ? s.oi.i3 : 0;
    const liSO = (s.exp.insSY - 1) * 12 + (s.exp.insSM - 1), liEO = (s.exp.insEY - 1) * 12 + (s.exp.insEM - 1);
    const ins = (off >= liSO && off <= liEO) ? s.exp.ins : 0;
    const e1 = s.exp.e1 > 0 && isActive(s.exp.e1SY, s.exp.e1SM, s.exp.e1Dur, off) ? s.exp.e1 : 0;
    const e2 = s.exp.e2 > 0 && isActive(s.exp.e2SY, s.exp.e2SM, s.exp.e2Dur, off) ? s.exp.e2 : 0;
    const e3 = s.exp.e3 > 0 && isActive(s.exp.e3SY, s.exp.e3SM, s.exp.e3Dur, off) ? s.exp.e3 : 0;
    const lsO = (s.h.lsSY - 1) * 12 + (s.h.lsSM - 1);
    if (s.h.lsAmt > 0 && off === lsO) { mortBal = Math.max(0, mortBal - s.h.lsAmt); runBal -= s.h.lsAmt; }
    let mortM = 0;
    if (mortBal > 0) {
      const r = s.h.intRate / 100 / 12, rm = Math.max(0, s.h.targetMo - off);
      if (rm > 0 && s.h.accel) { if (rm === 1) { mortM = mortBal + mortBal * r; mortBal = 0; } else { const req = mortCalc(mortBal, s.h.intRate, rm); const mi = mortBal * r; mortM = req; mortBal = Math.max(0, mortBal - Math.min(req - mi, mortBal)); } }
      else if (rm > 0) { const mi = mortBal * r; const mp = Math.min(s.h.mortPmt - mi, mortBal); mortM = mi + mp; mortBal = Math.max(0, mortBal - mp); }
    }
    const gross = pSS + jSS + va + biz + jw + c35 + i1 + i2 + i3;
    const taxes = txAmt(pSS, s.tr.ss, s.ss.paulTax) + txAmt(jSS, s.tr.ss, s.ss.jessTax) + txAmt(biz, s.tr.biz, true) + txAmt(jw, s.tr.jess, true);
    const ncf = gross - taxes - livM - ins - e1 - e2 - e3 - mortM;
    runBal += ncf;
    const inv = Math.max(0, runBal) * s.sav.ret / 100 / 12;
    const invT = s.sav.taxGains && inv > 0 ? inv * s.sav.gainsTax / 100 : 0;
    runBal = safe(runBal + inv - invT);
    const hv = inf(s.h.homeVal, s.h.appreciation, off / 12);
    res.push({ mn, pSS: safe(pSS), jSS: safe(jSS), va: safe(va), biz: safe(biz), jw: safe(jw), gross: safe(gross), taxes: safe(taxes + invT), livM: safe(livM), ins: safe(ins), mort: safe(mortM), mortBal: safe(mortBal), ncf: safe(ncf), invRet: safe(inv), sav: safe(runBal), hv: safe(hv) });
  }
  return res;
}

function calcMetrics(ann, s) {
  if (!ann.length) return { nw: 0, tax: 0, cf: 0, growth: 0 };
  const f = ann[ann.length - 1];
  const totTax = ann.reduce((a, d) => a + d.totTax, 0);
  const totCF = ann.reduce((a, d) => a + d.ncf, 0);
  const avgCF = totCF / (s.pi.projYears * 12);
  const initNW = s.h.homeVal + s.sav.init - s.h.mortBal;
  const growth = ((f.nw - initNW) / Math.abs(initNW || 1)) * 100;
  return { nw: f.nw, tax: totTax, cf: avgCF, growth };
}

// ─── INPUT PANEL ──────────────────────────────────────────────────────
function InputPanel({ s, up }) {

      </Sec>

      {/* Savings & Taxes */}
      <Sec title="Savings & Taxes" icon="📈" defaultOpen={false}>
        <G2 gap={16}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8 }}>Investment Portfolio</div>

            <Inp label="Expected Annual Return (%)" v={sav.ret} onChange={v => usav({ ret: v })} sfx="%" step="0.1" />
            <div style={{ marginTop: 8 }}>
              <Sel label="Strategy" v={sav.strategy} onChange={v => { const r = { conservative: 4.5, balanced: 6.5, aggressive: 8.5 }; usav({ strategy: v, ret: r[v] || sav.ret }); }}
                opts={[{ v: "conservative", l: "Conservative (4.5%)" }, { v: "balanced", l: "Balanced (6.5%)" }, { v: "aggressive", l: "Aggressive (8.5%)" }, { v: "custom", l: "Custom" }]} />
            </div>

              <Chk label="Tax on investment gains" v={sav.taxGains} onChange={v => usav({ taxGains: v })} />

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>

              <Inp label="Business Income Tax (%)" v={tr.biz} onChange={v => utr({ biz: v })} sfx="%" />
              <Inp label="Jessica's Income Tax (%)" v={tr.jess} onChange={v => utr({ jess: v })} sfx="%" />
            </div>
          </div>
        </G2>
      </Sec>
    </div>
  );
}

// ─── CHART TOOLTIP ────────────────────────────────────────────────────
function CTT({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 7, padding: "9px 13px", fontSize: 12, boxShadow: "0 4px 12px rgba(0,0,0,.08)" }}>
      <div style={{ fontWeight: 600, color: "#475569", marginBottom: 5 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 14, color: p.color }}>
          <span>{p.name}</span>
          <span style={{ fontFamily: "monospace", fontWeight: 500 }}>{fmtM(p.value)}</span>
        </div>
      ))}
    </div>
  );
}

// ─── CHARTS PANEL ─────────────────────────────────────────────────────
function Charts({ ann }) {
  const [ct, setCt] = useState("savings");
  const btns = [{ id: "savings", l: "Savings & Net Worth" }, { id: "cashflow", l: "Cash Flow" }, { id: "income", l: "Income Breakdown" }];
  const sd = ann.map(d => ({ yr: d.yr, "Net Worth": Math.round(d.nw), "Savings": Math.round(d.sav), "Home Value": Math.round(d.hv) }));
  const cd = ann.map(d => ({ yr: d.yr, "After-Tax Income": Math.round(d.ati), "Expenses": Math.round(d.livExp + d.ins + d.mort), "Cash Flow": Math.round(d.ncf) }));
  const id = ann.map(d => ({ yr: d.yr, "Paul SS": Math.round(d.pSS), "Jessica SS": Math.round(d.jSS), "VA Disab.": Math.round(d.va), "Business": Math.round(d.biz), "Jess Work": Math.round(d.jw), "Ch.35": Math.round(d.c35) }));
  return (
    <Card style={{ padding: 16, marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>Financial Analysis</div>
        <div style={{ display: "flex", gap: 6 }}>
          {btns.map(b => <Btn key={b.id} onClick={() => setCt(b.id)} active={ct === b.id} sm>{b.l}</Btn>)}
        </div>
      </div>
      <ResponsiveContainer width="100%" height={280}>
        {ct === "savings"
          ? <ComposedChart data={sd}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
            <XAxis dataKey="yr" tick={{ fontSize: 10 }} />
            <YAxis tickFormatter={fmtM} tick={{ fontSize: 10 }} width={62} />
            <Tooltip content={<CTT />} />
            <Legend iconSize={10} wrapperStyle={{ fontSize: 11 }} />
            <Area type="monotone" dataKey="Net Worth" stroke={$.green} fill="rgba(5,150,105,.1)" strokeWidth={2} />
            <Area type="monotone" dataKey="Savings" stroke={$.blue} fill="rgba(37,99,235,.1)" strokeWidth={2} />
            <Line type="monotone" dataKey="Home Value" stroke={$.amber} strokeWidth={2} dot={false} />
          </ComposedChart>
          : ct === "cashflow"
            ? <ComposedChart data={cd}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="yr" tick={{ fontSize: 10 }} />
              <YAxis tickFormatter={fmtM} tick={{ fontSize: 10 }} width={62} />
              <Tooltip content={<CTT />} />
              <Legend iconSize={10} wrapperStyle={{ fontSize: 11 }} />
              <Bar dataKey="After-Tax Income" fill={$.blue} opacity={0.8} />
              <Bar dataKey="Expenses" fill={$.red} opacity={0.8} />
              <Line type="monotone" dataKey="Cash Flow" stroke={$.green} strokeWidth={2} dot={false} />
            </ComposedChart>
            : <AreaChart data={id}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="yr" tick={{ fontSize: 10 }} />
              <YAxis tickFormatter={fmtM} tick={{ fontSize: 10 }} width={62} />
              <Tooltip content={<CTT />} />
              <Legend iconSize={10} wrapperStyle={{ fontSize: 11 }} />
              {[["Paul SS", $.blue], ["Jessica SS", "#7c3aed"], ["VA Disab.", $.green], ["Business", $.amber], ["Jess Work", "#ec4899"], ["Ch.35", "#14b8a6"]].map(([k, c]) =>
                <Area key={k} type="monotone" dataKey={k} stackId="1" stroke={c} fill={c} fillOpacity={0.7} />
              )}
            </AreaChart>}
      </ResponsiveContainer>
    </Card>
  );
}

// ─── AI DIALOGUE ──────────────────────────────────────────────────────
function AIDial({ s }) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const botRef = useRef(null);
  useEffect(() => { botRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const sys = () => {
    const ann = calcAnnual(s); const m = calcMetrics(ann, s);
    return `You are a retirement planning advisor for Paul and Jessica Miller.\nKey snapshot:\n- Paul age ${s.pi.paulAge}, Jessica age ${s.pi.jessAge}, ${s.pi.projYears}-yr projection from ${s.pi.startY}\n- Final Net Worth: ${fmt(m.nw)}, Avg Monthly CF: ${fmt(m.cf)}, Total Taxes: ${fmt(m.tax)}\n- VA Disability: $${s.oi.va}/mo (tax-free, 50% survivor ≥2035)\n- Business (CozyPhones): $${s.oi.biz}/mo for ${s.oi.bizDur} months\n- Paul SS at age ${s.ss.paulStart}: $${s.ss.paulAmt}/mo\n- Jessica SS at age ${s.ss.jessStart}: $${s.ss.jessAmt + s.ss.jessSpousal}/mo combined\n- Chapter 35: $${s.oi.ch35}/mo for ${s.oi.ch35Dur} months\n- Monthly living: $${getLiving(s.exp)} + ${s.exp.infl}% inflation\n- Savings: $${s.sav.init} init at ${s.sav.ret}% annual return\nPaul is a service-disabled Marine veteran and founder of CozyPhones/Halo Acoustic Wear LLC. Answer questions clearly and helpfully.`;
  };

  const send = async () => {
    if (!inp.trim() || loading) return;
    const msg = inp.trim(); setInp("");
    setMsgs(p => [...p, { role: "user", content: msg }]); setLoading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: sys(), messages: [...msgs, { role: "user", content: msg }] }) });
      const d = await r.json();
      setMsgs(p => [...p, { role: "assistant", content: d.content?.[0]?.text || "No response." }]);
    } catch (e) { setMsgs(p => [...p, { role: "assistant", content: "Error connecting. Please try again." }]); }
    setLoading(false);
  };

  return (
    <Card style={{ marginBottom: 16, overflow: "hidden" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", padding: "11px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "none", border: "none", cursor: "pointer" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, fontWeight: 600, color: "#1e293b" }}>
          <span>🤖</span>AI Retirement Advisor
          <span style={{ fontSize: 10, background: "rgba(37,99,235,.1)", color: $.blue, padding: "2px 8px", borderRadius: 10 }}>Claude-powered</span>
        </div>
        <span style={{ color: "#94a3b8", fontSize: 11 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ borderTop: "1px solid #f1f5f9", padding: "14px 16px" }}>
          <div style={{ height: 240, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
            {!msgs.length && <div style={{ textAlign: "center", color: "#94a3b8", fontSize: 12, paddingTop: 40 }}><div style={{ fontSize: 24, marginBottom: 6 }}>💬</div>Ask anything about your retirement plan...</div>}
            {msgs.map((m, i) => (
              <div key={i} style={{ padding: "8px 12px", borderRadius: 8, fontSize: 12, lineHeight: 1.5, alignSelf: m.role === "user" ? "flex-end" : "flex-start", background: m.role === "user" ? $.navy : "#f1f5f9", color: m.role === "user" ? "#fff" : "#1e293b", maxWidth: "85%" }}>{m.content}</div>
            ))}
            {loading && <div style={{ padding: "8px 12px", borderRadius: 8, fontSize: 12, background: "#f1f5f9", color: "#94a3b8", alignSelf: "flex-start" }}>Analyzing your plan...</div>}
            <div ref={botRef} />
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <input type="text" value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Ask about your plan, what-ifs, scenarios..." disabled={loading}
              style={{ flex: 1, padding: "6px 10px", border: "1px solid #e2e8f0", borderRadius: 6, fontSize: 12 }} />
            <button onClick={send} disabled={loading || !inp.trim()} style={{ padding: "6px 16px", background: $.navy, color: "#fff", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: "pointer", opacity: (loading || !inp.trim()) ? 0.5 : 1 }}>Send</button>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {["What's my Year 5 income?", "When should Paul claim SS?", "How's my retirement trajectory?", "What if business income doubles?"].map(q =>
              <button key={q} onClick={() => setInp(q)} style={{ padding: "3px 10px", background: "#f1f5f9", border: "1px solid #e2e8f0", borderRadius: 12, fontSize: 11, color: "#475569", cursor: "pointer" }}>{q}</button>
            )}
          </div>
        </div>
      )}
    </Card>
  );
}

// ─── SCENARIO MANAGER ─────────────────────────────────────────────────
function ScenarioMgr({ s, onLoad }) {
  const [open, setOpen] = useState(false);
  const [scenarios, setScenarios] = useState([]);
  const [name, setName] = useState("");
  const ref = useRef(null);
  useEffect(() => { loadAll(); }, []);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h);
  }, []);
  const loadAll = async () => { try { const keys = await window.storage.list("sc:"); const lst = []; for (const k of (keys.keys || [])) { const r = await window.storage.get(k); if (r) lst.push({ k, n: k.replace("sc:", ""), d: JSON.parse(r.value) }); } setScenarios(lst); } catch (e) { setScenarios([]); } };
  const save = async () => { if (!name.trim()) return; try { await window.storage.set("sc:" + name, JSON.stringify(s)); setName(""); loadAll(); } catch (e) { } };
  const del = async (k) => { try { await window.storage.delete(k); loadAll(); } catch (e) { } };
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen(!open)} style={{ padding: "5px 12px", border: "1px solid rgba(255,255,255,.25)", borderRadius: 6, fontSize: 12, background: "transparent", color: "rgba(255,255,255,.8)", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
        💾 Scenarios {scenarios.length > 0 && <span style={{ background: "rgba(255,255,255,.2)", padding: "0 6px", borderRadius: 8, fontSize: 10 }}>{scenarios.length}</span>}
      </button>
      {open && (
        <div style={{ position: "absolute", right: 0, top: "calc(100% + 4px)", background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, padding: 12, width: 260, boxShadow: "0 8px 24px rgba(0,0,0,.12)", zIndex: 100 }}>
          <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Save Current</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            <input type="text" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && save()} placeholder="Scenario name..."
              style={{ flex: 1, padding: "5px 8px", border: "1px solid #e2e8f0", borderRadius: 5, fontSize: 11 }} />
            <button onClick={save} disabled={!name.trim()} style={{ padding: "5px 10px", background: $.navy, color: "#fff", border: "none", borderRadius: 5, fontSize: 11, cursor: "pointer", opacity: !name.trim() ? 0.5 : 1 }}>Save</button>
          </div>
          {scenarios.length > 0 && <div>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Saved Scenarios</div>
            {scenarios.map(sc => (
              <div key={sc.k} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid #f1f5f9" }}>
                <span style={{ flex: 1, fontSize: 12 }}>{sc.n}</span>
                <button onClick={() => { onLoad(sc.d); setOpen(false); }} style={{ padding: "3px 8px", background: "rgba(37,99,235,.1)", color: $.blue, border: "none", borderRadius: 4, fontSize: 10, cursor: "pointer" }}>Load</button>
                <button onClick={() => del(sc.k)} style={{ padding: "3px 6px", background: "rgba(220,38,38,.1)", color: $.red, border: "none", borderRadius: 4, fontSize: 10, cursor: "pointer" }}>✕</button>
              </div>
            ))}
          </div>}
        </div>
      )}
    </div>
  );
}

// ─── RESULTS TABLE ────────────────────────────────────────────────────
function ResultsTable({ ann, monthly, viewMode, setViewMode, selYr, setSelYr, s }) {
  const CV = (n) => <span style={{ color: n > 0 ? $.green : n < 0 ? $.red : "#64748b", fontFamily: "monospace" }}>{fmt(n)}</span>;
  const yopts = Array.from({ length: s.pi.projYears }, (_, i) => ({ v: String(i + 1), l: `Year ${i + 1} (${2025 + i})` }));
  const thStyle = { background: $.navy, color: "#fff", padding: "7px 10px", textAlign: "right", fontWeight: 500, fontSize: 10, whiteSpace: "nowrap", position: "sticky", top: 0, zIndex: 2 };
  const tdStyle = { padding: "5px 10px", textAlign: "right", borderBottom: "1px solid #f1f5f9", fontFamily: "monospace", fontSize: 11 };
  return (
    <Card style={{ overflow: "hidden" }}>
      <div style={{ padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #f1f5f9", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>Projection Data</div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {viewMode === "monthly" && (
            <select value={selYr} onChange={e => setSelYr(parseInt(e.target.value))}
              style={{ padding: "4px 22px 4px 8px", border: "1px solid #e2e8f0", borderRadius: 5, fontSize: 11, width: 160, appearance: "none" }}>
              {yopts.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          {["annual", "monthly"].map(m => <Btn key={m} onClick={() => setViewMode(m)} active={viewMode === m} sm>{m.charAt(0).toUpperCase() + m.slice(1)}</Btn>)}
        </div>
      </div>
      <div style={{ overflowX: "auto", maxHeight: 440, overflowY: "auto" }}>
        {viewMode === "annual"
          ? <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr>
              {["Year", "Ages", "Paul SS", "Jess SS", "VA Disab", "Business", "Total Inc", "Taxes", "Living Exp", "Mortgage", "Cash Flow", "Inv Return", "Savings", "Home Value", "Net Worth"].map((h, i) =>
                <th key={i} style={{ ...thStyle, textAlign: i === 0 ? "left" : "right" }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {ann.map(d => <tr key={d.yr} style={{ background: d.yr % 2 === 0 ? "#fafafa" : "#fff" }}>
                <td style={{ ...tdStyle, textAlign: "left", fontFamily: "inherit", fontWeight: 600 }}>{d.yr}</td>
                <td style={tdStyle}>{d.pAge}/{d.jAge}</td>
                <td style={tdStyle}>{CV(d.pSS)}</td>
                <td style={tdStyle}>{CV(d.jSS)}</td>
                <td style={tdStyle}>{CV(d.va)}</td>
                <td style={tdStyle}>{CV(d.biz)}</td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.totInc)}</td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.totTax)}</span></td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.livExp)}</span></td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.mort)}</span></td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.ncf)}</td>
                <td style={tdStyle}>{CV(d.netInv)}</td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.sav)}</td>
                <td style={tdStyle}>{CV(d.hv)}</td>
                <td style={{ ...tdStyle, fontWeight: 700 }}>{CV(d.nw)}</td>
              </tr>)}
            </tbody>
          </table>
          : <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr>
              {["Month", "Paul SS", "Jess SS", "VA", "Business", "Gross Inc", "Taxes", "Living", "Mortgage", "Cash Flow", "Inv Ret", "Savings", "Home Value"].map((h, i) =>
                <th key={i} style={{ ...thStyle, textAlign: i === 0 ? "left" : "right" }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {monthly.map((d, i) => <tr key={i} style={{ background: i % 2 === 0 ? "#fafafa" : "#fff" }}>
                <td style={{ ...tdStyle, textAlign: "left", fontFamily: "inherit", fontWeight: 600 }}>{d.mn}</td>
                <td style={tdStyle}>{CV(d.pSS)}</td>
                <td style={tdStyle}>{CV(d.jSS)}</td>
                <td style={tdStyle}>{CV(d.va)}</td>
                <td style={tdStyle}>{CV(d.biz)}</td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.gross)}</td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.taxes)}</span></td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.livM)}</span></td>
                <td style={tdStyle}><span style={{ color: $.red, fontFamily: "monospace" }}>{fmt(d.mort)}</span></td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.ncf)}</td>
                <td style={tdStyle}>{CV(d.invRet)}</td>
                <td style={{ ...tdStyle, fontWeight: 600 }}>{CV(d.sav)}</td>
                <td style={tdStyle}>{CV(d.hv)}</td>
              </tr>)}
            </tbody>
          </table>}
      </div>
    </Card>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App() {
  const [s, setS] = useState(() => {
    try { const saved = localStorage.getItem("urp-v2"); return saved ? JSON.parse(saved) : getDefault(); } catch (e) { return getDefault(); }
  });
  const [viewMode, setViewMode] = useState("annual");
  const [selYr, setSelYr] = useState(1);

  useEffect(() => { try { localStorage.setItem("urp-v2", JSON.stringify(s)); } catch (e) { } }, [s]);

  const ann = useMemo(() => calcAnnual(s), [s]);
  const monthly = useMemo(() => calcMonthly(s, selYr), [s, selYr]);
  const metrics = useMemo(() => calcMetrics(ann, s), [ann, s]);

  const up = (sec, updates) => setS(p => ({ ...p, [sec]: { ...p[sec], ...updates } }));

  const setDefault = async () => {
    if (window.confirm("Save current values as defaults?")) {
      try { await window.storage.set("urp-default", JSON.stringify(s)); } catch (e) { localStorage.setItem("urp-default", JSON.stringify(s)); }
      alert("Saved as defaults!");
    }
  };
  const reset = async () => {
    if (window.confirm("Reset to saved defaults?")) {
      try { const r = await window.storage.get("urp-default"); if (r) setS(JSON.parse(r.value)); else setS(getDefault()); }
      catch (e) { const r = localStorage.getItem("urp-default"); if (r) setS(JSON.parse(r)); else setS(getDefault()); }
      setSelYr(1);
    }
  };

  const cf = metrics.cf, nw = metrics.nw, gr = metrics.growth;

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f8", fontFamily: "system-ui, sans-serif" }}>
      {/* Header */}
      <div style={{ background: $.navy, color: "#fff", padding: "13px 20px", marginBottom: 16 }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-.01em" }}>📊 Ultimate Retirement Planner</div>
            <div style={{ fontSize: 11, opacity: .6, marginTop: 2 }}>Paul & Jessica · {s.pi.projYears}-yr projection · starting {s.pi.startY}</div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <ScenarioMgr s={s} onLoad={setS} />
            <button onClick={setDefault} style={{ padding: "5px 12px", border: "1px solid rgba(255,255,255,.25)", borderRadius: 6, fontSize: 12, background: "transparent", color: "rgba(255,255,255,.75)", cursor: "pointer" }}>💾 Set Default</button>
            <button onClick={reset} style={{ padding: "5px 12px", border: "1px solid rgba(255,255,255,.2)", borderRadius: 6, fontSize: 12, background: "transparent", color: "rgba(255,255,255,.5)", cursor: "pointer" }}>↩ Reset</button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1400, margin: "0 auto", padding: "0 16px 32px" }}>
        <InputPanel s={s} up={up} />

        {/* Summary cards */}
        <G4 gap={12} style={{ marginBottom: 16 }}>
          <MetCard label="Final Net Worth" value={fmtM(nw)} sub={`After ${s.pi.projYears} years`} color={nw >= 0 ? $.green : $.red} />
          <MetCard label="Total Taxes Paid" value={fmtM(metrics.tax)} sub="Cumulative" color={$.red} />
          <MetCard label="Avg Monthly Cash Flow" value={fmtM(cf)} sub="After all expenses" color={cf >= 0 ? $.blue : $.red} />
          <MetCard label="Net Worth Growth" value={`${gr >= 0 ? "+" : ""}${gr.toFixed(0)}%`} sub="From starting net worth" color={gr >= 0 ? $.green : $.red} />
        </G4>

        <Charts ann={ann} />
        <AIDial s={s} />
        <ResultsTable ann={ann} monthly={monthly} viewMode={viewMode} setViewMode={setViewMode} selYr={selYr} setSelYr={setSelYr} s={s} />
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
