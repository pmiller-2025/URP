<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ultimate Retirement Planner</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}#pw-gate{position:fixed;inset:0;background:#1e3a5f;display:flex;align-items:center;justify-content:center;z-index:9999}#pw-box{background:white;border-radius:14px;padding:40px 48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);width:340px}#pw-box h1{font-size:22px;font-weight:700;color:#1e3a5f;margin-bottom:6px}#pw-box p{font-size:13px;color:#64748b;margin-bottom:24px}#pw-input{width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;text-align:center;letter-spacing:3px;outline:none}#pw-input:focus{border-color:#2563eb}#pw-btn{width:100%;margin-top:12px;padding:11px;background:#1e3a5f;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}#pw-error{color:#dc2626;font-size:12px;margin-top:10px;min-height:18px}</style>

<div id="pw-gate"><div id="pw-box"><div style="font-size:42px;margin-bottom:12px">&#128202;</div><h1>Retirement Planner</h1><p>Paul &amp; Jessica &middot; Private Access</p><input id="pw-input" type="password" placeholder="Enter password" autofocus /><button id="pw-btn" onclick="checkPw()">Unlock</button><div id="pw-error"></div></div></div>

    var val = document.getElementById('pw-input').value;
    if (val === 'chillers') { document.getElementById('pw-gate').style.display = 'none'; try { sessionStorage.setItem('urp-auth','1'); } catch(e){} }
    else { var err = document.getElementById('pw-error'); err.textContent = 'Incorrect password. Try again.'; document.getElementById('pw-input').value = ''; document.getElementById('pw-input').focus(); setTimeout(function(){ err.textContent = ''; }, 3000); }
  }
  try { if (sessionStorage.getItem('urp-auth') === '1') document.getElementById('pw-gate').style.display = 'none'; } catch(e){}
  document.addEventListener('DOMContentLoaded', function() { var i = document.getElementById('pw-input'); if (i) i.addEventListener('keydown', function(e){ if(e.key==='Enter') checkPw(); }); });
</script>
